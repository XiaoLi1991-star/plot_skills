skill_name: rplot
display_name: "RPlot Generic Plotting"
version: "0.4.0"
docker_image: "codex-rplot:latest"
dockerfile: "Dockerfile"

runtime_dependencies:
  local_install: "Rscript scripts/install_deps.R"
  docker_build: "docker build -t codex-rplot:latest ."
  package: "codex.rplot"
  recommended_for_codex: "local_install"

usage:
  output_rule: "Use --plot_name as an output prefix; every workflow writes <prefix>.png and <prefix>.pdf."
  health_check: "Run Rscript scripts/check_install.R for a fast dependency and smoke-test check."
  validation: "Run Rscript scripts/run_all_examples.R to validate all bundled examples."
  script_root: "Use paths relative to the skill root for local runs, or /skills/rplot inside the Docker image."

common_params:
  - "--data_input"
  - "--input_matrix"
  - "--sample_info"
  - "--plot_name"
  - "--theme"
  - "--palette"
  - "--fig_width"
  - "--fig_height"
  - "--base_font_size"
  - "--title"
  - "--x_title"
  - "--y_title"

workflows:
  - id: scatter_bubble_plot
    module_dir: scatter_bubble
    script: scatter_bubble_plot.R
    example: "Rscript scripts/scatter_bubble/scatter_bubble_plot.R --data_input examples/data/generic_measurements.tsv --x_col score_a --y_col abundance --color_col group --size_col score_b --label_col biomarker --label_top_n 5 --plot_name figures/scatter_bubble_plot"
  - id: box_violin_plot
    module_dir: box_violin
    script: box_violin_plot.R
    example: "Rscript scripts/box_violin/box_violin_plot.R --data_input examples/data/generic_measurements.tsv --x_col group --y_col abundance --mode box_violin --sort_by_median TRUE --plot_name figures/box_violin_plot"
  - id: bar_lollipop_plot
    module_dir: bar_lollipop
    script: bar_lollipop_plot.R
    example: "Rscript scripts/bar_lollipop/bar_lollipop_plot.R --data_input examples/data/category_scores.tsv --category_col term --value_col score --color_col category --mode lollipop --top_n 12 --plot_name figures/bar_lollipop_plot"
  - id: correlation_heatmap
    module_dir: correlation_heatmap
    script: correlation_heatmap.R
    example: "Rscript scripts/correlation_heatmap/correlation_heatmap.R --data_input examples/data/generic_measurements.tsv --columns score_a,score_b,abundance --plot_name figures/correlation_heatmap"
  - id: matrix_heatmap
    module_dir: matrix_heatmap
    script: matrix_heatmap.R
    example: "Rscript scripts/matrix_heatmap/matrix_heatmap.R --input_matrix examples/data/expression_matrix.tsv --sample_info examples/data/sample_info.tsv --id_col feature --plot_name figures/matrix_heatmap"
  - id: pca_plot
    module_dir: pca_plot
    script: pca_plot.R
    example: "Rscript scripts/pca_plot/pca_plot.R --input_matrix examples/data/expression_matrix.tsv --sample_info examples/data/sample_info.tsv --id_col feature --plot_name figures/pca_plot"
  - id: upset_plot
    module_dir: upset_plot
    script: upset_plot.R
    example: "Rscript scripts/upset_plot/upset_plot.R --data_input examples/data/set_membership.tsv --item_col item --set_col set --plot_name figures/upset_plot"
  - id: alluvial_plot
    module_dir: alluvial_plot
    script: alluvial_plot.R
    example: "Rscript scripts/alluvial_plot/alluvial_plot.R --data_input examples/data/alluvial_paths.tsv --axis_cols source,class,outcome --weight_col count --fill_col source --plot_name figures/alluvial_plot"

